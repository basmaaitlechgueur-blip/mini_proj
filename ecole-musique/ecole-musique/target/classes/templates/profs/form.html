<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Saisie Professeur - Ecole de Musique')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<main class="main-content">
    <div class="header-actions">
        <h1 th:text="${prof.id != null ? 'Modifier le professeur' : 'Nouveau Professeur'}">Nouveau Professeur</h1>
    </div>

    <div class="form-container">
        <form th:action="@{/profs}" th:object="${prof}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nom">Nom complet</label>
                <input type="text" id="nom" th:field="*{nom}" class="form-control" placeholder="Prénom Nom" />
                <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="error-text">Erreur</span>
            </div>

            <div class="form-group">
                <label for="specialite">Spécialité Principale</label>
                <input type="text" id="specialite" th:field="*{specialite}" class="form-control" placeholder="Ex: Piano, Solfège..." />
                <span th:if="${#fields.hasErrors('specialite')}" th:errors="*{specialite}" class="error-text">Erreur</span>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{/profs}" class="btn btn-secondary" style="margin-left: 1rem;">Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
