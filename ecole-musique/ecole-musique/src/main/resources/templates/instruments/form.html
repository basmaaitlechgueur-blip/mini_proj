<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Saisie Instrument - Ecole de Musique')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<main class="main-content">
    <div class="header-actions">
        <h1 th:text="${instrument.id != null ? 'Modifier l''instrument' : 'Nouvel Instrument'}">Nouvel Instrument</h1>
    </div>

    <div class="form-container">
        <form th:action="@{/instruments}" th:object="${instrument}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nom">Nom de l'instrument</label>
                <input type="text" id="nom" th:field="*{nom}" class="form-control" placeholder="Ex: Violon" />
                <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="error-text">Erreur</span>
            </div>

            <div class="form-group">
                <label for="famille">Famille</label>
                <input type="text" id="famille" th:field="*{famille}" class="form-control" placeholder="Ex: Cordes, Cuivres..." />
                <span th:if="${#fields.hasErrors('famille')}" th:errors="*{famille}" class="error-text">Erreur</span>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="disponibilite" th:field="*{disponibilite}" style="width: auto;" />
                <label for="disponibilite" style="margin: 0; display: inline;">Disponible pour les cours</label>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-info">Enregistrer</button>
                <a th:href="@{/instruments}" class="btn btn-info" style="margin-left: 1rem;">Annuler</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
